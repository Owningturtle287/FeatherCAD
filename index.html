<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#007ba7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FeatherCAD">
  <meta name="description" content="Lightweight mobile-first parametric CAD">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
  <link rel="stylesheet" href="./styles.css">
  <title>FeatherCAD</title>
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/three.module.min.js",
      "three/addons/": "./vendor/three/addons/"
    }
  }
  </script>
</head>
<body>
  <div id="app" data-booting aria-live="polite">
    <main class="startup-screen"><img src="./assets/logo-mark.svg" alt=""><strong>FeatherCAD</strong><span>Loading local CAD engine…</span></main>
  </div>
  <noscript><main class="startup-failure"><h1>JavaScript is required</h1><p>Enable JavaScript and reload FeatherCAD.</p></main></noscript>
  <div id="toast-region" class="toast-region" aria-live="assertive"></div>
  <input id="file-picker" type="file" hidden accept=".feathercad,.fcd,.stl,.obj,.gltf,.glb,.3mf,.dxf,.svg">
  <script>
    (() => {
      let reported = false;
      const showFailure = reason => {
        const app = document.getElementById('app');
        if (reported || !app || !app.hasAttribute('data-booting')) return;
        reported = true;
        const message = reason && reason.message ? reason.message : String(reason || 'A required application module could not be loaded.');
        app.innerHTML = `<main class="startup-failure"><img src="./assets/logo-mark.svg" alt=""><h1>FeatherCAD couldn’t start</h1><p>${message.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}</p><p class="field-help">The most common cause is an outdated offline cache after deployment.</p><div><button class="primary" id="startup-reload">Reload</button><button class="secondary" id="startup-reset">Reset app cache</button></div></main>`;
        document.getElementById('startup-reload').onclick = () => location.reload();
        document.getElementById('startup-reset').onclick = async () => {
          if ('serviceWorker' in navigator) for (const registration of await navigator.serviceWorker.getRegistrations()) await registration.unregister();
          if ('caches' in window) for (const key of await caches.keys()) await caches.delete(key);
          location.reload();
        };
      };
      addEventListener('error', event => showFailure(event.error || event.message), true);
      addEventListener('unhandledrejection', event => showFailure(event.reason));
      setTimeout(() => showFailure(new Error('Startup timed out while loading the local CAD engine.')), 10000);
    })();
  </script>
  <script type="module" src="./src/app.js?v=1.0.1"></script>
</body>
</html>
